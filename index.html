<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur Borne</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between antialiased">

    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-gray-100 text-center transition-all duration-300 hover:shadow-2xl">
            
            <div class="w-full bg-gray-100 h-2 rounded-full mb-8 overflow-hidden">
                <div class="bg-emerald-500 h-full w-1/3 rounded-full"></div>
            </div>

            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight leading-tight mb-3">
                Trouvez la meilleure borne pour votre véhicule
            </h1>
            <p class="text-slate-500 font-medium text-sm mb-8">
                Simulateur gratuit, rapide et indépendant - Normes IRVE 2026
            </p>

            <div class="text-left mb-8">
                <label for="car-select" class="block text-slate-800 font-bold text-base mb-3">
                    Quelle est la marque de votre véhicule électrique ?
                </label>
                <div class="relative">
                    <select id="car-select" class="block w-full bg-slate-50 border border-slate-200 text-slate-800 font-semibold py-4 px-5 pr-10 rounded-2xl appearance-none focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                        <option value="tesla">Tesla</option>
                        <option value="renault">Renault</option>
                        <option value="peugeot">Peugeot</option>
                        <option value="fiat">Fiat</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <button onclick="validerEtape()" class="w-full bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-emerald-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-base cursor-pointer">
                Continuer 
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>

        </div>
    </main>

    <footer class="w-full text-center py-6 px-4 bg-white border-t border-gray-100">
        <p class="text-xs text-slate-400 font-medium max-w-md mx-auto leading-relaxed">
            &copy; 2026 Comparateur-Borne.fr - Les estimations de temps de charge dépendent des architectures réseau.
        </p>
    </footer>

    <script>
        function validerEtape() {
            const vehicule = document.getElementById('car-select').value;
            alert("Félicitations, simulateur fonctionnel ! Étape suivante bientôt disponible pour votre véhicule : " + vehicule.toUpperCase());
        }
    </script>

</body>
</html>
