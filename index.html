
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur Borne</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <div id="card" class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 mx-auto">
        
        <div id="step-1" class="step">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Votre projet</h1>
            <label class="block text-slate-800 font-bold mb-2">Code Postal :</label>
            <input type="number" id="input-cp" placeholder="Ex: 69000" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
            <button onclick="nextStep(2)" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Continuer</button>
        </div>

        <div id="step-2" class="step hidden">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Votre véhicule</h1>
            <label class="block text-slate-800 font-bold mb-2">Sélectionnez la marque :</label>
            <select id="input-car" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
                <option>Tesla</option><option>Renault</option><option>Peugeot</option><option>Volkswagen</option><option>Audi</option>
            </select>
            <button onclick="showComparison()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Voir les bornes disponibles</button>
        </div>

        <div id="result" class="step hidden">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Choisissez votre borne</h1>
            <div id="options-container" class="space-y-4">
                <div class="border-2 border-emerald-500 p-4 rounded-2xl bg-emerald-50">
                    <h3 class="font-bold text-lg">Borne Éco (3.7 kW)</h3>
                    <p class="text-sm text-slate-600 mb-2">Idéal pour les petites recharges nocturnes.</p>
                    <button class="w-full bg-emerald-600 text-white py-2 rounded-xl text-sm font-bold">Sélectionner</button>
                </div>
                <div class="border-2 border-slate-200 p-4 rounded-2xl">
                    <h3 class="font-bold text-lg">Borne Standard (7.4 kW)</h3>
                    <p class="text-sm text-slate-600 mb-2">Le meilleur rapport qualité/prix.</p>
                    <button class="w-full bg-slate-800 text-white py-2 rounded-xl text-sm font-bold">Sélectionner</button>
                </div>
                <div class="border-2 border-slate-200 p-4 rounded-2xl">
                    <h3 class="font-bold text-lg">Borne Premium (22 kW)</h3>
                    <p class="text-sm text-slate-600 mb-2">Charge ultra-rapide pour gros rouleurs.</p>
                    <button class="w-full bg-slate-800 text-white py-2 rounded-xl text-sm font-bold">Sélectionner</button>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full mt-6 text-slate-400 text-sm">Recommencer la simulation</button>
        </div>
    </div>

    <script>
        function nextStep(s) {
            document.querySelectorAll('.step').forEach(e => e.classList.add('hidden'));
            document.getElementById('step-'+s).classList.remove('hidden');
        }
        function showComparison() {
            document.querySelectorAll('.step').forEach(e => e.classList.add('hidden'));
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
