<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBR - Comparateur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-6">

    <div class="max-w-md mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-emerald-500 text-6xl font-black italic">VBR</h1>
        </div>

        <div id="step-1" class="step bg-slate-900 p-6 rounded-3xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4">Localisation</h2>
            <input type="text" id="cp" maxlength="5" oninput="fetchCities()" placeholder="Code Postal (ex: 75000)" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-700 mb-4 outline-none focus:border-emerald-500">
            <select id="ville" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-700 mb-6 outline-none focus:border-emerald-500">
                <option value="">Entrez un code postal d'abord</option>
            </select>
            <button onclick="nextStep(2)" class="w-full bg-emerald-500 text-slate-950 p-4 rounded-xl font-bold hover:bg-emerald-400 transition-all">Continuer</button>
        </div>

        <div id="step-2" class="step hidden bg-slate-900 p-6 rounded-3xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4">Votre véhicule</h2>
            <select id="marque" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-700 mb-6 outline-none focus:border-emerald-500">
                <option>Tesla</option><option>Renault</option><option>Peugeot</option><option>Volkswagen</option><option>Citroën</option>
                <option>BMW</option><option>Mercedes-Benz</option><option>Audi</option><option>Toyota</option><option>Kia</option>
                <option>Hyundai</option><option>Fiat</option><option>Ford</option><option>Nissan</option><option>Volvo</option>
                <option>Skoda</option><option>Seat</option><option>Cupra</option><option>Mini</option><option>Porsche</option>
                <option>Dacia</option><option>Jeep</option><option>Mazda</option><option>Mitsubishi</option><option>Honda</option>
            </select>
            <button onclick="showResults()" class="w-full bg-emerald-500 text-slate-950 p-4 rounded-xl font-bold hover:bg-emerald-400 transition-all">Voir les bornes</button>
        </div>

        <div id="step-3" class="step hidden">
            <h2 class="text-2xl font-bold mb-6 text-center text-emerald-500">Bornes recommandées</h2>
            <div id="results-list" class="space-y-4"></div>
            <button onclick="location.reload()" class="w-full mt-8 text-slate-500 text-sm hover:text-white underline">Recommencer</button>
        </div>
    </div>

    <script>
        async function fetchCities() {
            const cp = document.getElementById('cp').value;
            const villeSelect = document.getElementById('ville');
            if (cp.length === 5) {
                const response = await fetch(`https://geo.api.gouv.fr/communes?codePostal=${cp}`);
                const data = await response.json();
                villeSelect.innerHTML = data.length > 0 ? '' : '<option>Aucune ville trouvée</option>';
                data.forEach(c => villeSelect.innerHTML += `<option value="${c.nom}">${c.nom}</option>`);
            }
        }

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(step => step.classList.add('hidden'));
            document.getElementById('step-' + s).classList.remove('hidden');
        }

        function showResults() {
            nextStep(3);
            
            // Ton lien d'affiliation intégré
            const lienAffiliation = "https://agv.bis-electric.com/?P5130A958B5C92131&redir=https%3A%2F%2Fwww.bis-electric.com%2F%23dc1e%2Fmobile-brand-categories%";
            
            const bornes = [
                { nom: "Wallbox Pulsar Plus", prix: 690, temps: "6h" },
                { nom: "Hager Witty", prix: 990, temps: "4h" },
                { nom: "Schneider EVlink", prix: 1450, temps: "2h" }
            ];
            
            bornes.sort((a, b) => a.prix - b.prix);
            
            const list = document.getElementById('results-list');
            list.innerHTML = bornes.map(b => `
                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-700 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-lg">${b.nom}</h3>
                        <p class="text-emerald-400 font-bold text-xl">${b.prix}€</p>
                    </div>
                    <a href="${lienAffiliation}" target="_blank" class="bg-emerald-500 text-slate-900 px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-400">Acheter</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
