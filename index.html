
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBR - Comparateur de Bornes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.6); }
        .bg-glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-lg mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-emerald-500 text-6xl font-black italic neon-text">VBR</h1>
            <p class="text-slate-400 mt-2 uppercase tracking-widest text-sm">Comparateur Expert</p>
        </div>

        <div id="step-1" class="step bg-glass p-6 rounded-3xl border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold">1</span> 
                Votre localisation
            </h2>
            
            <label class="block text-sm mb-2 text-slate-400">Code Postal</label>
            <input type="text" id="cp" maxlength="5" oninput="fetchCities()" placeholder="Ex: 75000" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 mb-4 outline-none focus:border-emerald-500 transition-all">

            <label class="block text-sm mb-2 text-slate-400">Ville</label>
            <select id="ville" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 mb-8 outline-none focus:border-emerald-500">
                <option value="">Entrez un code postal d'abord</option>
            </select>

            <button onclick="nextStep(2)" class="w-full bg-emerald-500 text-slate-950 p-4 rounded-xl font-black text-lg hover:bg-emerald-400 transition-all shadow-lg shadow-emerald-500/20">Continuer</button>
        </div>

        <div id="step-2" class="step hidden bg-glass p-6 rounded-3xl border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-950 w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold">2</span> 
                Votre véhicule
            </h2>
            <select id="marque" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 mb-8 outline-none focus:border-emerald-500">
                <option>Tesla</option><option>Renault</option><option>Volkswagen</option><option>Peugeot</option>
                <option>Kia</option><option>Hyundai</option><option>Audi</option><option>BMW</option>
                <option>Mercedes-Benz</option><option>Fiat</option><option>Volvo</option><option>Cupra</option>
                <option>MG</option><option>Toyota</option><option>Skoda</option><option>Ford</option>
                <option>Citroën</option><option>Nissan</option><option>Mini</option><option>Porsche</option>
            </select>
            <button onclick="showResults()" class="w-full bg-emerald-500 text-slate-950 p-4 rounded-xl font-black text-lg hover:bg-emerald-400 transition-all shadow-lg shadow-emerald-500/20">Comparer les bornes</button>
        </div>

        <div id="step-3" class="step hidden">
            <h2 class="text-2xl font-bold mb-6 text-center text-emerald-500">Bornes recommandées</h2>
            <div id="results-list" class="space-y-4"></div>
            <button onclick="location.reload()" class="w-full mt-8 text-slate-500 text-sm hover:text-emerald-500 transition-colors">← Recommencer</button>
        </div>
    </div>

    <script>
        // Logique API Ville
        async function fetchCities() {
            const cp = document.getElementById('cp').value;
            const villeSelect = document.getElementById('ville');
            if (cp.length === 5) {
                const response = await fetch(`https://geo.api.gouv.fr/communes?codePostal=${cp}`);
                const data = await response.json();
                villeSelect.innerHTML = data.length > 0 ? '' : '<option>Aucune ville trouvée</option>';
                data.forEach(c => villeSelect.innerHTML += `<option value="${c.nom}">${c.nom}</option>`);
            }
        }

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(step => step.classList.add('hidden'));
            document.getElementById('step-' + s).classList.remove('hidden');
        }

        function showResults() {
            nextStep(3);
            const lienAffiliation = "https://agv.bis-electric.com/?P5130A958B5C92131&redir=https%3A%2F%2Fwww.bis-electric.com%2F%23dc1e%2Fmobile-brand-categories%";
            
            // Liste des bornes
            const bornes = [
                { nom: "Wallbox Pulsar Plus", prix: 690, temps: "6h" },
                { nom: "Hager Witty", prix: 990, temps: "4h" },
                { nom: "Schneider EVlink", prix: 1450, temps: "2h" }
            ];
            
            // Tri automatique du prix bas vers haut
            bornes.sort((a, b) => a.prix - b.prix);
            
            const list = document.getElementById('results-list');
            list.innerHTML = bornes.map(b => `
                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-700 flex justify-between items-center hover:border-emerald-500 transition-colors">
                    <div>
                        <h3 class="font-bold text-lg">${b.nom}</h3>
                        <p class="text-slate-400 text-xs">Charge complète : ${b.temps}</p>
                        <p class="text-emerald-400 font-bold text-xl mt-1">${b.prix}€</p>
                    </div>
                    <a href="${lienAffiliation}" target="_blank" class="bg-emerald-500 text-slate-950 px-6 py-3 rounded-xl font-bold hover:bg-emerald-400 transition-all">Acheter</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
