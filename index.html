
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur Borne</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <div id="card" class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 mx-auto">
        
        <div id="step-1" class="step">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Votre projet</h1>
            <label class="block text-slate-800 font-bold mb-2">Code Postal :</label>
            <input type="number" id="input-cp" placeholder="Ex: 69000" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
            <button onclick="nextStep(2)" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Continuer</button>
        </div>

        <div id="step-2" class="step hidden">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Votre véhicule</h1>
            <label class="block text-slate-800 font-bold mb-2">Marque :</label>
            <select id="input-car" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
                <option>Tesla</option><option>Renault</option><option>Peugeot</option><option>Volkswagen</option><option>Audi</option><option>BMW</option><option>Mercedes</option><option>Kia</option><option>Hyundai</option>
            </select>
            <button onclick="nextStep(3)" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Continuer</button>
        </div>

        <div id="step-3" class="step hidden">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Sélectionnez votre borne</h1>
            <label class="block text-slate-800 font-bold mb-2">Choix du modèle :</label>
            <select id="input-borne" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
                <option value="Wallbox Pulsar Max (Mono 7.4kW) - €€">Économique : Wallbox Pulsar Max (Mono 7.4kW)</option>
                <option value="Schneider EVlink (Mono 7.4kW) - €€€">Standard : Schneider EVlink (Mono 7.4kW)</option>
                <option value="Hager Witty (Triphasé 22kW) - €€€€">Performance : Hager Witty (Triphasé 22kW)</option>
                <option value="Tesla Wall Connector (Triphasé 22kW) - €€€€">Premium : Tesla Wall Connector (Triphasé 22kW)</option>
            </select>
            <button onclick="showResult()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Valider mon choix</button>
        </div>

        <div id="result" class="step hidden text-center">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-4">Récapitulatif</h1>
            <div id="final-msg" class="bg-slate-50 p-6 rounded-2xl mb-6 text-slate-700 leading-relaxed text-left"></div>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Recommencer</button>
        </div>
    </div>

    <script>
        function nextStep(s) {
            document.querySelectorAll('.step').forEach(e => e.classList.add('hidden'));
            document.getElementById('step-'+s).classList.remove('hidden');
        }
        function showResult() {
            const cp = document.getElementById('input-cp').value;
            const car = document.getElementById('input-car').value;
            const borne = document.getElementById('input-borne').value;
            document.querySelectorAll('.step').forEach(e => e.classList.add('hidden'));
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-msg').innerHTML = `📍 Localisation : <strong>${cp}</strong><br>🚗 Véhicule : <strong>${car}</strong><br>⚡ Configuration : <strong>${borne}</strong><br><br>Un expert vous contactera pour valider cette installation à Lissieu.`;
        }
    </script>
</body>
</html>
