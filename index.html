<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur VBR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">

    <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <span class="text-emerald-500 text-4xl font-black italic">VBR</span>
        </div>

        <div id="step-1" class="step">
            <h1 class="text-2xl font-bold mb-4">Localisation</h1>
            <input type="text" id="cp" placeholder="Code postal (ex: 75000)" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 mb-4 text-white">
            <input type="text" id="ville" placeholder="Votre ville" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 mb-4 text-white">
            <button onclick="nextStep(2)" class="w-full bg-emerald-600 p-4 rounded-xl font-bold hover:bg-emerald-500 transition-all">Continuer</button>
        </div>

        <div id="step-2" class="step hidden">
            <h1 class="text-2xl font-bold mb-4">Votre véhicule</h1>
            <input type="text" id="modele" placeholder="Modèle (ex: Tesla Model 3)" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 mb-4 text-white">
            <button onclick="showResults()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold hover:bg-emerald-500 transition-all">Comparer les bornes</button>
        </div>

        <div id="step-3" class="step hidden">
            <h1 class="text-2xl font-bold mb-4">Bornes recommandées</h1>
            <div id="results-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        function nextStep(s) {
            document.querySelectorAll('.step').forEach(step => step.classList.add('hidden'));
            document.getElementById('step-' + s).classList.remove('hidden');
        }

        function showResults() {
            nextStep(3);
            
            // Ton lien d'affiliation
            const lienAffiliation = "https://agv.bis-electric.com/?P5130A958B5C92131&redir=https%3A%2F%2Fwww.bis-electric.com%2F%23dc1e%2Fmobile-brand-categories%";

            const bornes = [
                { nom: "Wallbox Pulsar Plus", prix: "690€", temps: "6h", lien: lienAffiliation },
                { nom: "Hager Witty", prix: "990€", temps: "4h", lien: lienAffiliation, best: true },
                { nom: "Schneider EVlink", prix: "1450€", temps: "2h", lien: lienAffiliation }
            ];
            
            const list = document.getElementById('results-list');
            list.innerHTML = bornes.map(b => `
                <div class="bg-slate-800 p-5 rounded-2xl flex justify-between items-center border ${b.best ? 'border-emerald-500' : 'border-slate-700'} relative">
                    ${b.best ? '<span class="absolute -top-3 left-4 bg-emerald-500 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Le plus populaire</span>' : ''}
                    <div>
                        <h3 class="font-bold">${b.nom}</h3>
                        <p class="text-[10px] text-slate-400">Charge complète : ${b.temps}</p>
                        <p class="text-emerald-400 font-bold text-lg mt-1">${b.prix}</p>
                    </div>
                    <a href="${b.lien}" target="_blank" class="bg-emerald-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-500 transition-all">Acheter</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
