<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur Borne</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div id="card" class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        
        <div id="step-1" class="step">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Votre localisation</h1>
            <label class="block text-slate-800 font-bold mb-2">Code Postal :</label>
            <input type="number" id="input-cp" placeholder="Ex: 69000" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
            <button onclick="nextStep(2)" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Continuer</button>
        </div>

        <div id="step-2" class="step hidden">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Votre véhicule</h1>
            <label class="block text-slate-800 font-bold mb-2">Marque :</label>
            <select id="input-car" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
                <option>Tesla</option><option>Renault</option><option>Peugeot</option><option>Volkswagen</option><option>Audi</option><option>BMW</option><option>Kia</option><option>Hyundai</option>
            </select>
            <button onclick="nextStep(3)" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Continuer</button>
        </div>

        <div id="step-3" class="step hidden">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-6 text-center">Type de Borne</h1>
            <label class="block text-slate-800 font-bold mb-2">Puissance souhaitée :</label>
            <select id="input-borne" class="w-full bg-slate-50 border p-4 rounded-2xl mb-6">
                <option value="3.7 kW">3.7 kW (Standard)</option>
                <option value="7.4 kW">7.4 kW (Rapide)</option>
                <option value="11 kW">11 kW (Triphasé)</option>
                <option value="22 kW">22 kW (Très rapide)</option>
            </select>
            <button onclick="showResult()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl">Calculer</button>
        </div>

        <div id="result" class="step hidden text-center">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-4">Simulation réussie !</h1>
            <p id="final-msg" class="text-slate-600 mb-6"></p>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Recommencer</button>
        </div>
    </div>

    <script>
        function nextStep(s) {
            document.querySelectorAll('.step').forEach(e => e.classList.add('hidden'));
            document.getElementById('step-'+s).classList.remove('hidden');
        }
        function showResult() {
            const cp = document.getElementById('input-cp').value;
            const car = document.getElementById('input-car').value;
            const borne = document.getElementById('input-borne').value;
            document.querySelectorAll('.step').forEach(e => e.classList.add('hidden'));
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-msg').innerHTML = `Pour votre <strong>${car}</strong> située au <strong>${cp}</strong>, nous recommandons une borne <strong>${borne}</strong>.`;
        }
    </script>
</body>
</html>
